services:
  postgres:
    image: postgres:15
    container_name: nexogestao_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nexogestao
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nexogestao"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7
    container_name: nexogestao_redis
    ports:
      - "6379:6379"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nexogestao_api
    env_file:
      - .env.docker
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/nexogestao?schema=public
      NODE_ENV: production
      REDIS_HOST: redis
      REDIS_PORT: "6379"

      # Auto apply migrations when db is empty
      AUTO_MIGRATE: "1"

      # Optional: wait for postgres (seconds)
      DB_WAIT_SECONDS: "40"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "3000:3000"
    restart: unless-stopped

    # PROD: usa o entrypoint dentro da imagem (ele já faz migrate/seed/check dist)
    entrypoint: ["/app/apps/api/docker-entrypoint.sh"]
    volumes:
      - ./apps/api:/app/apps/api

volumes:
  pgdata:
