version: '3.9'

# ============================================================
# NexoGestao — Docker Compose PRODUÇÃO
# ============================================================
# Serviços: api, web, postgres, redis, nginx
# Uso:
#   cp .env.example .env.prod
#   docker compose -f docker-compose.prod.yml --env-file .env.prod up -d
# ============================================================

services:

  # ─── PostgreSQL ────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: nexogestao_postgres_prod
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-nexo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD obrigatório}
      POSTGRES_DB:       ${POSTGRES_DB:-nexogestao}
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
      - ./scripts/backup:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nexo} -d ${POSTGRES_DB:-nexogestao}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - nexo_internal
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─── Redis ─────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: nexogestao_redis_prod
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-nexoredis} --appendonly yes
    volumes:
      - redisdata_prod:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-nexoredis}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nexo_internal
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

  # ─── API (NestJS) ──────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: ./apps/api/Dockerfile.prod
      args:
        NODE_ENV: production
    container_name: nexogestao_api_prod
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      NODE_ENV:     production
      DATABASE_URL: postgresql://${POSTGRES_USER:-nexo}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-nexogestao}?schema=public
      REDIS_URL:    redis://:${REDIS_PASSWORD:-nexoredis}@redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - nexo_internal
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

  # ─── Web (Frontend) ────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile.prod
      args:
        NODE_ENV: production
        VITE_API_URL: ${VITE_API_URL:-/api}
    container_name: nexogestao_web_prod
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      NODE_ENV: production
    depends_on:
      api:
        condition: service_healthy
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - nexo_internal
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─── Nginx (Reverse Proxy + HTTPS) ─────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: nexogestao_nginx_prod
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
      - certbot_www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt:ro
    depends_on:
      - api
      - web
    networks:
      - nexo_internal
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─── Certbot (Let's Encrypt — renovação automática) ────────
  certbot:
    image: certbot/certbot:latest
    container_name: nexogestao_certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    # Renovação automática a cada 12h
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - nexo_internal

# ─── Volumes ───────────────────────────────────────────────
volumes:
  pgdata_prod:
    driver: local
  redisdata_prod:
    driver: local
  nginx_logs:
    driver: local
  certbot_www:
    driver: local
  certbot_conf:
    driver: local

# ─── Networks ──────────────────────────────────────────────
networks:
  nexo_internal:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
