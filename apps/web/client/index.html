<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NexoGestão</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        min-height: 100%;
        background: #f3f4f6;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }
      #html-immediate-marker {
        min-height: 100vh;
        display: grid;
        place-items: center;
        color: #111827;
      }
      #html-immediate-marker .panel {
        width: min(720px, calc(100vw - 32px));
        background: #ffffff;
        border: 1px solid #d1d5db;
        border-radius: 10px;
        box-shadow: 0 6px 30px rgba(15, 23, 42, 0.08);
        padding: 16px;
      }
      #html-immediate-marker .title { font-size: 18px; font-weight: 700; }
      #html-immediate-marker .subtitle { margin-top: 6px; font-size: 13px; color: #4b5563; }
      #boot-watchdog, #pre-react-error {
        display: none;
        position: fixed;
        inset: 12px;
        margin: auto;
        max-width: 980px;
        max-height: 85vh;
        overflow: auto;
        z-index: 2147483647;
        background: #111827;
        color: #fee2e2;
        border: 1px solid #7f1d1d;
        border-radius: 10px;
        padding: 14px;
        font: 600 12px/1.45 system-ui;
      }
      #root { position: relative; z-index: 2; }
    </style>
  </head>

  <body>
    <div id="html-immediate-marker" data-stage="html-loaded">
      <div class="panel">
        <div class="title">HTML carregado</div>
        <div class="subtitle">Bootstrap inicial executando… se React falhar, o diagnóstico aparece aqui.</div>
      </div>
    </div>

    <div id="root"></div>
    <div id="pre-react-error"></div>
    <div id="boot-watchdog"></div>

    <script>
      (function () {
        var fallbackVisible = false;

        function showPreReactError(label, details) {
          try {
            var panel = document.getElementById("pre-react-error");
            if (!panel) return;
            fallbackVisible = true;
            var text = typeof details === "string" ? details : JSON.stringify(details, null, 2);
            panel.style.display = "block";
            panel.innerHTML = ""
              + "<div style='font-size:16px;margin-bottom:6px;color:#fecaca'>Erro antes do React</div>"
              + "<div><strong>Mensagem:</strong> " + String(label) + "</div>"
              + "<div><strong>Pathname:</strong> " + window.location.pathname + "</div>"
              + "<pre style='margin-top:10px;white-space:pre-wrap;background:#020617;border:1px solid #334155;border-radius:8px;padding:10px;color:#e2e8f0'>" + (text || "(sem detalhes)") + "</pre>"
              + "<div style='margin-top:10px'><button onclick='window.location.reload()' style='background:#f97316;color:#fff;border:0;border-radius:6px;padding:8px 10px;cursor:pointer'>Recarregar</button></div>";
          } catch (_err) {
            // no-op
          }
        }

        try {
          console.log("[HTML] loaded", {
            pathname: window.location.pathname,
            readyState: document.readyState,
            title: document.title,
          });

          window.__NEXO_AUDIT__ = window.__NEXO_AUDIT__ || {
            events: [],
            pathname: window.location.pathname,
            readyState: document.readyState,
            title: document.title,
            rootFound: Boolean(document.getElementById("root")),
            htmlStartedAt: new Date().toISOString(),
          };

          window.onerror = function (message, source, lineno, colno, error) {
            console.error("[WINDOW_ERROR]", { message: String(message), source: source || null, lineno: lineno || null, colno: colno || null, stack: error && error.stack ? error.stack : null });
            showPreReactError(message, error && error.stack ? error.stack : String(message));
            return false;
          };

          window.onunhandledrejection = function (event) {
            console.error("[UNHANDLED_PROMISE]", { reason: event ? event.reason : null });
            showPreReactError("Promise rejeitada sem tratamento", event && event.reason ? event.reason : "Sem motivo");
          };

          window.addEventListener("nexo:app-mounted", function () {
            var marker = document.getElementById("html-immediate-marker");
            if (marker) marker.style.display = "none";
            var watchdog = document.getElementById("boot-watchdog");
            if (watchdog) watchdog.style.display = "none";
          });

          var watchdogTimer = window.setTimeout(function () {
            if (fallbackVisible) return;
            var audit = window.__NEXO_AUDIT__ || {};
            if (audit.appMountedAt) return;
            var watchdog = document.getElementById("boot-watchdog");
            if (!watchdog) return;
            watchdog.style.display = "block";
            watchdog.innerHTML = ""
              + "<div style='font-size:16px;margin-bottom:6px;color:#fecaca'>Erro de renderização</div>"
              + "<div>O app não confirmou mount no tempo esperado.</div>"
              + "<div><strong>Pathname:</strong> " + window.location.pathname + "</div>"
              + "<div><strong>Fase:</strong> " + (window.__NEXO_LAST_PHASE__ || "UNKNOWN") + "</div>"
              + "<div style='margin-top:10px'><button onclick='window.location.reload()' style='background:#f97316;color:#fff;border:0;border-radius:6px;padding:8px 10px;cursor:pointer'>Recarregar</button></div>";
          }, 8000);

          window.addEventListener("nexo:app-mounted", function () {
            window.clearTimeout(watchdogTimer);
          });
        } catch (error) {
          showPreReactError("Falha no script inline de bootstrap", error && error.stack ? error.stack : String(error));
        }
      })();
    </script>

    <script>
      console.log("[HTML] loading main.tsx", { src: "/src/main.tsx" });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
